<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Masala Map</title>
    <link rel="stylesheet" href="home.css">
</head>
<body>

    <header>
        <h1>The Masala Map</h1>
        <p>Discover your next favorite meal</p>

        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Search recipes, cuisines, or categories...">
            <button id="searchBtn">Search</button>
        </div>

        <div class="filter-section">
            <button class="filter-btn active">All</button>
            <button class="filter-btn">Vegetarian</button>
            <button class="filter-btn">Non-Veg</button>
        </div>
    </header>

    <main>
        <div id="recipe-container" class="grid"></div>
    </main>

    <script src="home.js"></script>
</body>
</html>
